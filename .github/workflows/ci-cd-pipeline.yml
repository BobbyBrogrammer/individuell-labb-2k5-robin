name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests
        run: mvn test -B
        env:
          # En Dummy-nyckel som används för att applikationen kräver "GROQ_API_KEY" vid start
          GROQ_API_KEY: dummy-key-for-ci

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test # Körs bara om testerna går igenom

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run OWASP Dependency-Check
        # "continue-on-error" gör att pipelinen fortsätter även om sårbarheter hittas
        run: mvn dependency-check:check "-Dnvd.api.key=${{ secrets.NVD_API_KEY }}"
        continue-on-error: true

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        if: always() # Gör att rapporten sparas oavsett om steget failar eller inte
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: security-scan # Gör att den aldrig publicerar utan säkerhetsskanning körts
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # Credentials som hanteras säkert via GitHub Secrets
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/individuell-labb-2k5:latest

      - name: Deploy (simulated)
        run: |
          echo "Deploying image ${{ secrets.DOCKERHUB_USERNAME }}/individuell-labb-2k5:latest"
          echo "Deployment complete!"